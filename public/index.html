<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragmented Realms</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="root"></div>

    <!-- React via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for JSX transpilation in the browser (for development simplicity) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Socket.IO client -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- React Application -->
    <!-- Load components first so they are defined for the entry point -->
    <script type="text/babel" data-presets="react" src="/src/components/UserList.js"></script>
    <script type="text/babel" data-presets="react" src="/src/components/Chat.js"></script>
    <script type="text/babel" data-presets="react" src="/src/components/Party.js"></script>
    <script type="text/babel" data-presets="react" src="/src/components/Resources.js"></script>
    <script type="text/babel" data-presets="react" src="/src/components/CharacterSheet.js"></script>
    <script type="text/babel" data-presets="react" src="/src/components/GameList.js"></script>
    <script type="text/babel" data-presets="react" src="/src/components/Auth.js"></script>
    <script type="text/babel" data-presets="react" src="/src/components/Lobby.js"></script>
    <script type="text/babel" data-presets="react" src="/src/components/rpg/WorldMap.js"></script>
    <script type="text/babel" data-presets="react" src="/src/components/RPG.js"></script>
    <script type="text/babel" data-presets="react" src="/src/App.js"></script>
    <script type="text/babel" data-presets="react" src="/src/index.js"></script>
</body>
</html>
