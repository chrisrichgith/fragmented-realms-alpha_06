<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragmented Realms - Kampf</title>
    <link rel="stylesheet" href="battle.css">
</head>
<body>
    <div id="battle-container">
        <div id="party-panel" class="battle-column">
            <h3>Your Party</h3>
            <div id="player-party-container">
                <!-- Player cards will be dynamically inserted here -->
            </div>
        </div>
        <div id="center-panel" class="battle-column">
            <h3>Battle Log</h3>
            <div id="battle-log">
                <!-- Battle messages will appear here -->
            </div>
            <div id="actions-container">
                <!-- Action buttons will be inserted here -->
            </div>
        </div>
        <div id="enemy-panel" class="battle-column">
            <h3>Enemies</h3>
            <div id="enemy-container">
                <!-- Enemy cards will be dynamically inserted here -->
            </div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="battle.js"></script>
</body>
</html>
